<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>One Room</title>

    <link rel="stylesheet" href="css/style.css" />
    <script defer src="js/app.js"></script>
  </head>
  <body>
    <div class="container">
      <nav class="nav">
        <div class="nav-logo">
          <h1 class="nav-logo--text">Cine<span> search</span></h1>
        </div>
        <div class="nav-mode">
          <button class="nav-mode-btn nav-mode-btn--active nav-mode-btn--movie">
            movies
          </button>
          <button class="nav-mode-btn nav-mode-btn--tv">tv</button>
        </div>
      </nav>

      <main class="content">
        <div class="master">
          <h1 class="master-header">
            find your next <br />
            <span> obsession.</span>
          </h1>
          <p class="master-sub-text">search millions of movies and tv shows</p>
          <input
            class="master-input"
            placeholder="search movies, shows, actors..."
          />
          <button class="master-input-btn">submit</button>
        </div>

        <div class="movies">
          <div class="movies-trend">
            <h2 class="movies-trend-text">trending this week</h2>
          </div>

          <div class="movies-grid">
            <div class="movies-grid-items">
              <div class="movies-grid-items-imgs">
                <img
                  src="img/movie.jpg"
                  class="movies-grid-items-img"
                  alt="movie name"
                />
              </div>
              <div class="movies-grid-items-info">
                <h3 class="movies-grid-items-info-title">Dune: Part Two</h3>
                <p class="movies-grid-items-info-year">2024</p>
              </div>
            </div>
            <div class="movies-grid-items"></div>
            <div class="movies-grid-items"></div>
            <div class="movies-grid-items"></div>
            <div class="movies-grid-items"></div>
            <div class="movies-grid-items"></div>
            <div class="movies-grid-items"></div>
            <div class="movies-grid-items"></div>
          </div>
        </div>
      </main>
    </div>
  </body>
</html>
